services:
  db:
    container_name: postgres_container
    image: postgres:14.23
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_password
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./postgres/airflow_init.sql:/docker-entrypoint-initdb.d/airflow_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d db"]
      interval: 5s
      retries: 5
    networks:
      - my-network
    
  loader:
    container_name: loader_container
    build:
      context: ./api-request
    environment:
      DB_USER: db_user
      DB_PASSWORD: db_password
      DB_NAME: db
      DB_HOST: postgres_container
    volumes:
      - ./docker-compose.yaml:/app/docker-compose.yaml
    networks:
      - my-network
    depends_on:
      db:
        condition: service_healthy
  
  af:
    container_name: airflow_container
    image: apache/airflow:3.0.0
    ports:
      - 8080:8080
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@db:5432/airflow_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      db: 
        condition: service_healthy
    networks:
      - my-network
    command: >
      bash -c "airflow db migrate && airflow standalone"
    
  dbt:
    container_name: dbt_container
    build:
      context: ./dbt
    volumes:
      - ./dbt/my_project:/usr/app

    working_dir: /usr/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my-network
    command: run

networks:
  my-network:
    driver: bridge
